name: "Build Docker Images"

on:
  workflow_dispatch:
  push:
  pull_request:
  schedule:
    # Run automatically at 00:00 on Sunday.
    - cron: "0 0 * * 0"

env:
  DOCKER_BUILDKIT: 1
  REGISTRY: "ghcr.io"
  IMAGE_NAME: ${{ github.repository }} # <account>/<repo>

jobs:
  build-images:
    strategy:
      matrix:
        version: [
          { runner: "blacksmith-2vcpu-ubuntu-2204", tag: "db", context: "./db/" },
          { runner: "blacksmith-2vcpu-ubuntu-2204", tag: "dbmate", context: "./dbmate/" },
          { runner: "blacksmith-2vcpu-ubuntu-2204-arm", tag: "dbmate-arm", context: "./dbmate/" },
        ]

    name: "image ${{ matrix.version.tag }}"
    runs-on: "${{ matrix.version.runner }}"
    permissions:
      contents: read
      packages: write

    steps:
      - uses: "actions/checkout@v6"

      - name: "Determine if images should be pushed"
        shell: "bash"
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PUSH_IMAGE=false" >> $GITHUB_ENV
          else
            echo "PUSH_IMAGE=true" >> $GITHUB_ENV
          fi

      - name: "Setup Blacksmith Builder"
        uses: "useblacksmith/setup-docker-builder@v1"

      - name: "Log into registry"
        uses: "docker/login-action@v3"
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Extract Docker metadata"
        id: "meta"
        uses: "docker/metadata-action@v5"
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags: |
            type=raw,value=${{ matrix.version.tag }}

      - name: "Build and push Docker image"
        uses: "useblacksmith/build-push-action@v2"
        with:
          context: ${{ matrix.version.context }}
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
